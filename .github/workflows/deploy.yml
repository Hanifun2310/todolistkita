name: Deploy Laravel to DirectAdmin

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      # 2. Setup Node.js & Build Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM & Build
        run: |
          npm install
          npm run build

      # 3. Bungkus Project menjadi 1 file ZIP (Kecuali file yang tidak perlu)
      - name: Create ZIP file
        run: |
          zip -r deploy.zip . -x "*.git*" "*node_modules*" "*vendor*" ".env.example" "README.md" "tests/*"

      # 4. Pindahkan ZIP ke folder khusus untuk diupload
      - name: Prepare Upload Folder
        run: |
          mkdir upload_ready
          mv deploy.zip upload_ready/

      # 5. Upload HANYA file deploy.zip ke Server
      - name: Deploy ZIP via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./upload_ready/
          server-dir: /
          dangerous-clean-slate: false